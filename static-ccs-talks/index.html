<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A forums platform for the OLFU-CCS community." />
    <title>CCS Talks (Static)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="ccs-app ccs-dark">
    <nav class="ccs-nav" aria-label="Primary">
      <span class="ccs-brand" role="link" tabindex="0" data-action="go-landing">CCS Talks</span>

      <div class="ccs-hide-mobile ccs-nav-links" aria-label="Sections">
        <button class="ccs-nav-link" data-action="go-about" type="button">About</button>
        <button class="ccs-nav-link" data-action="go-forum" type="button">Browse forum</button>
        <button class="ccs-nav-link" data-action="scroll-community" type="button">Community</button>
      </div>

      <div class="ccs-nav-actions">
        <button class="ccs-pill" data-action="toggle-mode" type="button" title="Toggle theme">
          <span aria-hidden="true" data-slot="mode-icon">🌙</span>
          <span class="sr-only" data-slot="mode-label">Dark mode</span>
        </button>
        <div data-slot="auth-actions" class="ccs-auth-actions"></div>
      </div>
    </nav>

    <!-- Sidebar shell (Forum/Profile/etc). Hidden unless the active route uses it. -->
    <button class="ccs-hamburger" type="button" aria-label="Open menu" data-action="sidebar-open">☰</button>
    <div class="ccs-sidebar-backdrop" data-slot="sidebar-backdrop" data-action="sidebar-close"></div>
    <aside class="ccs-sidebar" data-slot="sidebar"></aside>

    <main class="ccs-page" data-slot="page">
      <!-- Marketing shell screens -->
      <div data-screen="landing"></div>
      <div data-screen="about" hidden></div>
      <div data-screen="auth" hidden></div>

      <!-- Sidebar shell screens -->
      <div data-screen="forum" hidden></div>
      <div data-screen="search" hidden></div>
      <div data-screen="profile" hidden></div>
      <div data-screen="activities" hidden></div>
      <div data-screen="bookmarks" hidden></div>
      <div data-screen="friends" hidden></div>
      <div data-screen="subs" hidden></div>
      <div data-screen="settings" hidden></div>
      <div data-screen="admin" hidden></div>
    </main>

    <!-- Mini profile hover preview (forum) -->
    <div class="ccs-mini-profile" data-slot="mini-profile" hidden></div>

    <!-- Optional: GSAP for 1:1-ish entry animations (same as app). -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
